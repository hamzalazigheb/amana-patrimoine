version: '3.9'

# ═══════════════════════════════════════════════════════
# Amana Patrimoine — Production Docker Compose
#
# Usage on AWS server:
#   1. Copy .env.production to .env (fill all variables)
#   2. docker-compose up -d
#   3. docker-compose exec frontend npx prisma db push
#   4. docker-compose exec frontend node prisma/seed.js
# ═══════════════════════════════════════════════════════

services:

  # ─── PostgreSQL Database ──────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: amana_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-amana_patrimoine}
      POSTGRES_USER: ${POSTGRES_USER:-amana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-amana} -d ${POSTGRES_DB:-amana_patrimoine}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Next.js Frontend + API ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: amana_frontend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-amana}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-amana_patrimoine}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://amana-patrimoine.fr}
    volumes:
      # Persist uploaded files across container restarts
      - uploads_data:/app/public/uploads
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/features || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Nginx Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: amana_nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

# ─── Networks ─────────────────────────────────────────
networks:
  internal:
    # Private network — DB is not exposed to the internet
    driver: bridge
    internal: true
  external:
    # Public network — only nginx and frontend
    driver: bridge

# ─── Volumes ──────────────────────────────────────────
volumes:
  postgres_data:
    # PostgreSQL data persists across container restarts
  uploads_data:
    # Uploaded images persist across container restarts
  nginx_cache:
