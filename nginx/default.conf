# ═══════════════════════════════════════════════════════════════════════
# Amana Patrimoine — Nginx Reverse Proxy (HTTPS + chatbot proxy)
# ═══════════════════════════════════════════════════════════════════════

limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Next.js app
upstream nextjs {
    server frontend:3001;
}

# Chatbot backend — running on the host at port 8000
# host.docker.internal resolves to the Docker host thanks to extra_hosts in docker-compose.yml
upstream chatbot_backend {
    server host.docker.internal:8000;
}

# ───────────────────────────────────────────────────────────────────────
# HTTP — redirect everything to HTTPS + serve Let's Encrypt challenges
# ───────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name amana-patrimoine.fr www.amana-patrimoine.fr;

    # Certbot webroot challenge (must come before the redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://amana-patrimoine.fr$request_uri;
    }
}

# ───────────────────────────────────────────────────────────────────────
# HTTPS — main server
# ───────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name amana-patrimoine.fr www.amana-patrimoine.fr;

    # ── SSL certificates (managed by Certbot on the host) ──────────────
    ssl_certificate     /etc/letsencrypt/live/amana-patrimoine.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amana-patrimoine.fr/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/amana-patrimoine.fr/chain.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Session / stapling
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── www → apex redirect ─────────────────────────────────────────────
    if ($host = www.amana-patrimoine.fr) {
        return 301 https://amana-patrimoine.fr$request_uri;
    }

    client_max_body_size 6M;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Chatbot API proxy (/chatbot/ → localhost:8000/) ─────────────────
    # The chatbot widget calls https://amana-patrimoine.fr/chatbot/...
    # Nginx strips the /chatbot prefix and forwards to the local chatbot backend.
    location /chatbot/ {
        proxy_pass         http://chatbot_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        # WebSocket support (required by most chatbot backends)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Rate-limited auth endpoint ──────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass         http://nextjs;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Rate-limited API routes ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://nextjs;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Immutable static assets (hashed filenames, 1-year cache) ────────
    location /_next/static/ {
        proxy_pass         http://nextjs;
        proxy_set_header   Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── User uploads — same Docker volume as frontend (runtime files, not in Next bundle) ──
    location /uploads/ {
        alias /var/www/uploads/;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── Security: block hidden files ─────────────────────────────────────
    location ~ /\.env { deny all; return 404; }
    location ~ /\.git { deny all; return 404; }

    # ── Health check ─────────────────────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass         http://nextjs/api/public/features;
        proxy_set_header   Host $host;
    }

    # ── Everything else → Next.js ─────────────────────────────────────
    location / {
        proxy_pass         http://nextjs;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
