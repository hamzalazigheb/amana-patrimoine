# ═══════════════════════════════════════════════════════
# Amana Patrimoine — Nginx Reverse Proxy
# Handles: HTTP → HTTPS redirect, SSL termination,
#          proxy to Next.js, static asset caching
# ═══════════════════════════════════════════════════════

# Rate limiting zone (10MB shared memory, 30 req/min per IP)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ─── HTTP: Redirect all traffic to HTTPS ─────────────
server {
    listen 80;
    listen [::]:80;
    server_name amana-patrimoine.fr www.amana-patrimoine.fr;

    # Let's Encrypt ACME challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS: Main server block ─────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name amana-patrimoine.fr www.amana-patrimoine.fr;

    # SSL certificates (managed by Let's Encrypt / certbot)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # File upload limit (same as in API — 5MB)
    client_max_body_size 6M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Rate limit login endpoint ───────────────────
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://frontend:3000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Rate limit all API endpoints ────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://frontend:3000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Cache Next.js static assets (1 year) ────────
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Cache uploaded images (30 days) ─────────────
    location /uploads/ {
        proxy_pass http://frontend:3000;
        add_header Cache-Control "public, max-age=2592000";
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Block access to sensitive paths ─────────────
    location ~ /\.env {
        deny all;
        return 404;
    }

    location ~ /\.git {
        deny all;
        return 404;
    }

    # ── Health check endpoint (no logging) ──────────
    location /health {
        access_log off;
        proxy_pass http://frontend:3000/api/public/features;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── All other requests → Next.js ────────────────
    location / {
        proxy_pass http://frontend:3000;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
